services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: rate-limiting-aspnet-core:local
    container_name: rate-limiting-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ASPNETCORE_ENVIRONMENT=Development
      # Flip this to true if you want to test the Redis backplane locally
      - RateLimiting__EnableRedisBackplane=false
      - RateLimiting__Redis=redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  # Only needed if you set RateLimiting__EnableRedisBackplane=true above.
  # Safe to leave running either way - the app just won't use it.
  redis:
    image: redis:7-alpine
    container_name: rate-limiting-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
